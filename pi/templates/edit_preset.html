<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Preset bearbeiten</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <a href="/presets">← Zurück zur Preset-Verwaltung</a>

    <h1>Preset bearbeiten</h1>

    {% if preset %}
        <form method="POST">
            <div class="form-group">
                <label for="name">Preset-Name</label>
                <input type="text" id="name" name="name" value="{{ preset[1] }}" required>
            </div>

            <div class="form-group">
                <label for="temperature_min">Temperatur Minimum</label>
                <input type="number" step="0.1" id="temperature_min" name="temperature_min" value="{{ preset[2] }}" required>
            </div>

            <div class="form-group">
                <label for="temperature_max">Temperatur Maximum</label>
                <input type="number" step="0.1" id="temperature_max" name="temperature_max" value="{{ preset[3] }}" required>
            </div>

            <div class="form-group">
                <label for="humidity_min">Luftfeuchtigkeit Minimum</label>
                <input type="number" step="0.1" id="humidity_min" name="humidity_min" value="{{ preset[4] }}" required>
            </div>

            <div class="form-group">
                <label for="humidity_max">Luftfeuchtigkeit Maximum</label>
                <input type="number" step="0.1" id="humidity_max" name="humidity_max" value="{{ preset[5] }}" required>
            </div>

            <div class="form-group">
                <label for="light_min">Licht Minimum</label>
                <input type="number" id="light_min" name="light_min" value="{{ preset[6] }}" required>
            </div>

            <div class="form-group">
                <label for="light_max">Licht Maximum</label>
                <input type="number" id="light_max" name="light_max" value="{{ preset[7] }}" required>
            </div>

            <button type="submit">Änderungen speichern</button>
        </form>
    {% else %}
        <p>Preset nicht gefunden.</p>
    {% endif %}
</body>
</html>
