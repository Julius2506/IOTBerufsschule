<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Terrarium bearbeiten</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <a href="/terrariums">← Zurück zur Terrarium-Verwaltung</a>

    <h1>Terrarium bearbeiten</h1>

    {% if terrarium %}
        <form method="POST">
            <div class="form-group">
                <label for="name">Name des Terrariums</label>
                <input type="text" id="name" name="name" value="{{ terrarium[1] }}" required>
            </div>

            <div class="form-group">
                <label for="description">Beschreibung</label>
                <textarea id="description" name="description" rows="4">{{ terrarium[2] or "" }}</textarea>
            </div>

            <div class="form-group">
                <label for="arduino_id">Arduino-ID</label>
                <input type="text" id="arduino_id" name="arduino_id" value="{{ terrarium[3] }}" required>
            </div>

            <div class="form-group">
                <label for="preset_id">Preset auswählen</label>
                <select id="preset_id" name="preset_id">
                    <option value="">Kein Preset</option>
                    {% for preset in presets %}
                        <option
                            value="{{ preset[0] }}"
                            {% if terrarium[4] == preset[0] %}selected{% endif %}
                        >
                            {{ preset[1] }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit">Änderungen speichern</button>
        </form>
    {% else %}
        <p>Terrarium nicht gefunden.</p>
    {% endif %}
</body>
</html>
